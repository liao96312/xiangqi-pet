<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 800" width="100%" height="100%">
  <defs>
    <!-- 木纹纹理：多层 turbulence + 光照 -->
    <filter id="woodGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.08" numOctaves="5" seed="42" result="noise"/>
      <feColorMatrix type="matrix" in="noise" values="
        0.6 0 0 0 0.5
        0 0.45 0 0 0.3
        0 0 0.35 0 0.2
        0 0 0 1 0" result="coloredNoise"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.25" numOctaves="3" seed="7" result="fineNoise"/>
      <feColorMatrix type="matrix" in="fineNoise" values="
        0.25 0 0 0 0.55
        0 0.2 0 0 0.45
        0 0 0.15 0 0.3
        0 0 0 0.4 0" result="fineColored"/>
      <feComposite operator="arithmetic" in="coloredNoise" in2="fineColored" k1="0" k2="1" k3="0.35" k4="0" result="combined"/>
      <feDiffuseLighting in="combined" surfaceScale="2.5" diffuseConstant="1.3" lighting-color="#d4a86a">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite operator="in" in2="combined" result="litWood"/>
      <feColorMatrix type="matrix" in="litWood" values="
        1.15 0 0 0 0.02
        0 0.95 0 0 -0.01
        0 0 0.88 0 -0.03
        0 0 0 1 0" result="warmWood"/>
      <feGaussianBlur stdDeviation="0.2" result="smoothWood"/>
    </filter>

    <!-- 棋子红方木质感 -->
    <radialGradient id="redPiece" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#ffd4c4" />
      <stop offset="18%" stop-color="#e89888" />
      <stop offset="45%" stop-color="#c44a38" />
      <stop offset="78%" stop-color="#8a2214" />
      <stop offset="100%" stop-color="#4a0c06" />
    </radialGradient>

    <!-- 棋子黑方石质感 -->
    <radialGradient id="blackPiece" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#a0a0a0" />
      <stop offset="18%" stop-color="#5a5a5a" />
      <stop offset="45%" stop-color="#2a2a2a" />
      <stop offset="78%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>

    <!-- 边缘描边（金色） -->
    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8d878" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#c4a030" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8a6a18" stop-opacity="0.5"/>
    </linearGradient>

    <!-- 刻字阴影 -->
    <filter id="engraveRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dx="1.5" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#3a0804" flood-opacity="0.8"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="engraveBlack" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dx="1.5" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.8"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 棋子投影 -->
    <filter id="pieceShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2a1a0a" flood-opacity="0.5"/>
    </filter>

    <!-- 棋子 Symbol：红方 -->
    <symbol id="piece-red" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="36" fill="url(#redPiece)" filter="url(#pieceShadow)"/>
      <circle cx="40" cy="40" r="34" fill="none" stroke="url(#goldRim)" stroke-width="1.5"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="#8a1a10" stroke-width="1.2" opacity="0.6"/>
      <text x="40" y="52" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="38" font-weight="900" fill="#6a0a04" filter="url(#engraveRed)">將</text>
    </symbol>

    <!-- 棋子 Symbol：黑方 -->
    <symbol id="piece-black" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="36" fill="url(#blackPiece)" filter="url(#pieceShadow)"/>
      <circle cx="40" cy="40" r="34" fill="none" stroke="url(#goldRim)" stroke-width="1.5"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>
      <text x="40" y="52" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="38" font-weight="900" fill="#d8d8d8" filter="url(#engraveBlack)">帥</text>
    </symbol>
  </defs>

  <!-- 棋盘背景 -->
  <rect width="720" height="800" fill="#d4a86a" filter="url(#woodGrain)"/>

  <!-- 棋盘边框：外层深色 + 内层金色 -->
  <rect x="20" y="20" width="680" height="760" fill="none" stroke="#5a3a1a" stroke-width="6" rx="4"/>
  <rect x="26" y="26" width="668" height="748" fill="none" stroke="#8a6a2a" stroke-width="2" rx="2"/>

  <!-- 网格线组 -->
  <g stroke="#5a3a1a" stroke-width="2" stroke-linecap="square">
    <!-- 竖线（10条） -->
    <line x1="50" y1="50" x2="50" y2="400" />
    <line x1="50" y1="450" x2="50" y2="750" />
    <line x1="120" y1="50" x2="120" y2="750" />
    <line x1="190" y1="50" x2="190" y2="750" />
    <line x1="260" y1="50" x2="260" y2="750" />
    <line x1="330" y1="50" x2="330" y2="750" />
    <line x1="400" y1="50" x2="400" y2="750" />
    <line x1="470" y1="50" x2="470" y2="750" />
    <line x1="540" y1="50" x2="540" y2="750" />
    <line x1="610" y1="50" x2="610" y2="400" />
    <line x1="610" y1="450" x2="610" y2="750" />
    <line x1="680" y1="50" x2="680" y2="400" />
    <line x1="680" y1="450" x2="680" y2="750" />

    <!-- 横线（11条） -->
    <line x1="50" y1="50" x2="680" y2="50" />
    <line x1="50" y1="120" x2="680" y2="120" />
    <line x1="50" y1="190" x2="680" y2="190" />
    <line x1="50" y1="260" x2="680" y2="260" />
    <line x1="50" y1="330" x2="680" y2="330" />
    <line x1="50" y1="400" x2="680" y2="400" />
    <line x1="50" y1="450" x2="680" y2="450" />
    <line x1="50" y1="520" x2="680" y2="520" />
    <line x1="50" y1="590" x2="680" y2="590" />
    <line x1="50" y1="660" x2="680" y2="660" />
    <line x1="50" y1="730" x2="680" y2="730" />
    <line x1="50" y1="750" x2="680" y2="750" />
  </g>

  <!-- 九宫格斜线 -->
  <g stroke="#5a3a1a" stroke-width="2" stroke-linecap="square">
    <line x1="50" y1="50" x2="260" y2="260" />
    <line x1="260" y1="50" x2="50" y2="260" />
    <line x1="470" y1="50" x2="680" y2="260" />
    <line x1="680" y1="50" x2="470" y2="260" />
    <line x1="50" y1="540" x2="260" y2="750" />
    <line x1="260" y1="540" x2="50" y2="750" />
    <line x1="470" y1="540" x2="680" y2="750" />
    <line x1="680" y1="540" x2="470" y2="750" />
  </g>

  <!-- 楚河汉界 -->
  <text x="365" y="432" text-anchor="middle" font-family="KaiTi,STKaiti,serif" font-size="32" font-weight="800" fill="#7a5530" letter-spacing="6">楚 河 汉 界</text>

  <!-- 炮位标记 -->
  <g fill="none" stroke="#5a3a1a" stroke-width="2">
    <!-- 黑方炮位 -->
    <path d="M 120 90 L 100 90 L 100 110 M 120 90 L 140 90 L 140 110 M 120 300 L 100 300 L 100 320 M 120 300 L 140 300 L 140 320" />
    <path d="M 400 90 L 380 90 L 380 110 M 400 90 L 420 90 L 420 110 M 400 300 L 380 300 L 380 320 M 400 300 L 420 300 L 420 320" />
    <path d="M 610 90 L 590 90 L 590 110 M 610 90 L 630 90 L 630 110 M 610 300 L 590 300 L 590 320 M 610 300 L 630 300 L 630 320" />
    <path d="M 120 210 L 100 210 L 100 190 M 120 210 L 140 210 L 140 190 M 120 420 L 100 420 L 100 400 M 120 420 L 140 420 L 140 400" />
    <path d="M 400 210 L 380 210 L 380 190 M 400 210 L 420 210 L 420 190 M 400 420 L 380 420 L 380 400 M 400 420 L 420 420 L 420 400" />
    <path d="M 610 210 L 590 210 L 590 190 M 610 210 L 630 210 L 630 190 M 610 420 L 590 420 L 590 400 M 610 420 L 630 420 L 630 400" />
  </g>

  <!-- 示例棋子位置（展示效果） -->
  <use href="#piece-red" x="100" y="100" width="80" height="80"/>
  <use href="#piece-black" x="100" y="550" width="80" height="80"/>
</svg>
